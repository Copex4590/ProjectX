<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Project X Observation Map</title>

    <link rel="stylesheet" href="leaflet/leaflet.css">
    <script src="leaflet/leaflet.js"></script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        .observation-marker {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #e53935;
            border: 2px solid #ffffff;
            box-shadow: 0 0 8px rgba(229, 57, 53, 0.75);
        }
    </style>
</head>

<body>

<div id="map"></div>

<script>

let map = null;
let marker = null;
let pickEnabled = false;
let bridge = null;

function ensureMap()
{
    if (map)
        return;

    map = L.map("map").setView([47.4979, 19.0402], 12);

    L.tileLayer(
        "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        {
            maxZoom: 19,
            attribution: "© OpenStreetMap"
        }
    ).addTo(map);

    map.on("click", function(event)
    {
        if (!pickEnabled)
            return;

        setObservationMarker(event.latlng.lat, event.latlng.lng, true);
    });
}

function setObservationMarker(lat, lon, notify)
{
    ensureMap();

    const position = [lat, lon];

    if (!marker)
    {
        const icon = L.divIcon({
            className: "",
            html: "<div class='observation-marker'></div>",
            iconSize: [18, 18],
            iconAnchor: [9, 9]
        });

        marker = L.marker(position, { icon: icon }).addTo(map);
    }
    else
    {
        marker.setLatLng(position);
    }

    if (notify && bridge && bridge.reportLocation)
        bridge.reportLocation(lat, lon);
}

function setObservationPoint(lat, lon)
{
    setObservationMarker(lat, lon, false);
    ensureMap();
    map.setView([lat, lon], Math.max(map.getZoom(), 13));
}

function enablePickMode(enabled)
{
    pickEnabled = !!enabled;
}

function initBridge()
{
    if (typeof qt === "undefined")
        return;

    new QWebChannel(qt.webChannelTransport, function(channel)
    {
        bridge = channel.objects.bridge;
        ensureMap();
    });
}

initBridge();

</script>

</body>
</html>
