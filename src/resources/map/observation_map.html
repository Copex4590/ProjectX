<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Project X Observation Map</title>

    <link rel="stylesheet" href="leaflet/leaflet.css">
    <script src="leaflet/leaflet.js"></script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        .observation-marker {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #e53935;
            border: 2px solid #ffffff;
            box-shadow: 0 0 8px rgba(229, 57, 53, 0.75);
        }

        .map-empty-state {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            max-width: min(90%, 320px);
            padding: 12px 16px;
            border-radius: 10px;
            background: rgba(29, 33, 39, 0.92);
            border: 1px solid #3d4a5c;
            color: #d5dbe3;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            font-size: 13px;
            text-align: center;
            pointer-events: none;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        }

        .map-empty-state[hidden] {
            display: none;
        }
    </style>
</head>

<body>

<div id="map"></div>
<div id="empty-state" class="map-empty-state" hidden></div>

<script>

let map = null;
let marker = null;
let pickEnabled = false;
let bridge = null;

const WORLD_BOUNDS = L.latLngBounds(
    L.latLng(-60, -180),
    L.latLng(75, 180)
);

function ensureMap()
{
    if (map)
        return;

    map = L.map("map", {
        worldCopyJump: true,
        minZoom: 2,
        maxBounds: WORLD_BOUNDS,
        maxBoundsViscosity: 1.0
    });

    L.tileLayer(
        "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        {
            maxZoom: 19,
            attribution: "© OpenStreetMap"
        }
    ).addTo(map);

    fitWorldMap();

    map.on("click", function(event)
    {
        if (!pickEnabled)
            return;

        setObservationMarker(event.latlng.lat, event.latlng.lng, true);
    });
}

function fitWorldMap()
{
    ensureMap();
    map.fitBounds(WORLD_BOUNDS, { padding: [20, 20] });
}

function showEmptyOverlay(message)
{
    const overlay = document.getElementById("empty-state");

    if (!overlay)
        return;

    if (message)
    {
        overlay.textContent = message;
        overlay.hidden = false;
    }
    else
    {
        overlay.textContent = "";
        overlay.hidden = true;
    }
}

function clearObservationPoint(message)
{
    ensureMap();

    if (marker)
    {
        map.removeLayer(marker);
        marker = null;
    }

    fitWorldMap();
    showEmptyOverlay(message || "");
}

function setObservationMarker(lat, lon, notify)
{
    ensureMap();
    showEmptyOverlay("");

    const position = [lat, lon];

    if (!marker)
    {
        const icon = L.divIcon({
            className: "",
            html: "<div class='observation-marker'></div>",
            iconSize: [18, 18],
            iconAnchor: [9, 9]
        });

        marker = L.marker(position, { icon: icon }).addTo(map);
    }
    else
    {
        marker.setLatLng(position);
    }

    if (notify && bridge && bridge.reportLocation)
        bridge.reportLocation(lat, lon);
}

function setObservationPoint(lat, lon)
{
    setObservationMarker(lat, lon, false);
    ensureMap();
    map.setView([lat, lon], Math.max(map.getZoom(), 13));
}

function enablePickMode(enabled)
{
    pickEnabled = !!enabled;
}

function initBridge()
{
    if (typeof qt === "undefined")
        return;

    new QWebChannel(qt.webChannelTransport, function(channel)
    {
        bridge = channel.objects.bridge;
        ensureMap();
    });
}

initBridge();

</script>

</body>
</html>
