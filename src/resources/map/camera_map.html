<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Project X Camera Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        .camera-marker {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #1e88e5;
            text-shadow: 0 0 6px rgba(30, 136, 229, 0.8);
            transform-origin: center center;
        }
    </style>
</head>

<body>

<div id="map"></div>

<script>

let map = null;
let marker = null;
let pickMode = null;
let bridge = null;
let currentHeading = 0;

function ensureMap()
{
    if (map)
        return;

    map = L.map("map").setView([47.4979, 19.0402], 12);

    L.tileLayer(
        "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        {
            maxZoom: 19,
            attribution: "© OpenStreetMap"
        }
    ).addTo(map);

    map.on("click", function(event)
    {
        if (!pickMode || !marker)
            return;

        if (pickMode === "position")
        {
            setCameraMarker(
                event.latlng.lat,
                event.latlng.lng,
                currentHeading,
                true,
                "position"
            );
            return;
        }

        if (pickMode === "heading")
        {
            const origin = marker.getLatLng();
            const heading = bearingBetween(
                origin.lat,
                origin.lng,
                event.latlng.lat,
                event.latlng.lng
            );

            setCameraMarker(origin.lat, origin.lng, heading, true, "heading");
        }
    });
}

function bearingBetween(lat1, lon1, lat2, lon2)
{
    const lat1Rad = lat1 * Math.PI / 180.0;
    const lat2Rad = lat2 * Math.PI / 180.0;
    const dLon = (lon2 - lon1) * Math.PI / 180.0;

    const y = Math.sin(dLon) * Math.cos(lat2Rad);
    const x = Math.cos(lat1Rad) * Math.sin(lat2Rad)
        - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLon);

    return (Math.atan2(y, x) * 180.0 / Math.PI + 360.0) % 360.0;
}

function setCameraMarker(lat, lon, heading, notify, notifyKind)
{
    ensureMap();

    currentHeading = heading;
    const position = [lat, lon];

    if (!marker)
    {
        const icon = L.divIcon({
            className: "",
            html: "<div class='camera-marker'>📷</div>",
            iconSize: [28, 28],
            iconAnchor: [14, 14]
        });

        marker = L.marker(position, { icon: icon }).addTo(map);
    }
    else
    {
        marker.setLatLng(position);
    }

    const element = marker.getElement();

    if (element)
    {
        const body = element.querySelector(".camera-marker");

        if (body)
            body.style.transform = "rotate(" + heading + "deg)";
    }

    if (!notify || !bridge)
        return;

    if (notifyKind === "position" && bridge.reportPosition)
        bridge.reportPosition(lat, lon);

    if (notifyKind === "heading" && bridge.reportHeading)
        bridge.reportHeading(heading);
}

function setCamera(lat, lon, heading)
{
    setCameraMarker(lat, lon, heading, false);
    ensureMap();
    map.setView([lat, lon], Math.max(map.getZoom(), 13));
}

function setHeading(heading)
{
    if (!marker)
        return;

    const latLng = marker.getLatLng();
    setCameraMarker(latLng.lat, latLng.lng, heading, false);
}

function enablePositionPick(enabled)
{
    pickMode = enabled ? "position" : null;
}

function enableHeadingPick(enabled)
{
    pickMode = enabled ? "heading" : null;
}

function initBridge()
{
    if (typeof qt === "undefined")
        return;

    new QWebChannel(qt.webChannelTransport, function(channel)
    {
        bridge = channel.objects.bridge;
        ensureMap();
    });
}

initBridge();

</script>

</body>
</html>
