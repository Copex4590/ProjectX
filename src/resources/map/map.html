<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Project X Map</title>

    <link rel="stylesheet" href="../theme/colors.css">
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script src="engine/contract.js"></script>
    <script src="engine/cesium/render_transaction.js"></script>
    <script src="engine/cesium/entity_pool.js"></script>
    <script src="engine/cesium/viewport_utils.js"></script>
    <script src="engine/cesium/renderer_diagnostics.js"></script>
    <script src="engine/cesium/renderer_lifecycle.js"></script>
    <script src="engine/cesium/geodesic.js"></script>
    <script src="engine/cesium/camera_layer.js"></script>
    <script src="engine/cesium/bearing_layer.js"></script>
    <script src="engine/cesium/camera_frustum_layer.js"></script>
    <script src="engine/cesium/coverage_layer.js"></script>
    <script src="engine/cesium/observation_layer.js"></script>
    <script src="engine/cesium/ship_layer.js"></script>
    <script src="engine/cesium/popup_layer.js"></script>
    <script src="engine/cesium/scene_graph.js"></script>
    <script src="engine/cesium_engine.js"></script>
    <script src="engine/factory.js"></script>

    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        .map-empty-state {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            max-width: min(90%, 320px);
            padding: 12px 16px;
            border-radius: 10px;
            background: rgba(29, 33, 39, 0.92);
            border: 1px solid #3d4a5c;
            color: #d5dbe3;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            font-size: 13px;
            text-align: center;
            pointer-events: none;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        }

        .map-empty-state[hidden] {
            display: none;
        }

        .map-empty-state.map-empty-state--top {
            top: 16px;
            bottom: auto;
            transform: translateX(-50%);
        }

        .vessel-card {
            --vc-bg: rgba(18, 22, 30, 0.92);
            --vc-border: rgba(255, 255, 255, 0.08);
            --vc-text: #eef2f7;
            --vc-muted: #8b95a5;
            --vc-label: #7a8494;
            --vc-radius: 10px;

            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            color: var(--vc-text);
            background: var(--vc-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--vc-border);
            border-radius: var(--vc-radius);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.32);
            overflow: hidden;
            width: min(300px, calc(100vw - 48px));
        }

        .vessel-card--compact {
            width: min(248px, calc(100vw - 48px));
        }

        .vessel-card--standard {
            width: min(280px, calc(100vw - 48px));
        }

        .vessel-card--detailed,
        .vessel-card--media {
            width: min(300px, calc(100vw - 48px));
        }

        .vessel-card__scroll {
            display: flex;
            flex-direction: column;
        }

        .vessel-card__scroll--scrollable {
            max-height: min(56vh, 400px);
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.18) transparent;
        }

        .vessel-card--compact .vessel-card__scroll--scrollable {
            max-height: min(36vh, 240px);
        }

        .vessel-card--standard .vessel-card__scroll--scrollable {
            max-height: min(48vh, 340px);
        }

        .vessel-card--media .vessel-card__scroll--scrollable {
            max-height: min(60vh, 440px);
        }

        .vessel-card__hero {
            display: flex;
            gap: 8px;
            padding: 8px 10px 6px;
            align-items: flex-start;
        }

        .vessel-card--compact .vessel-card__hero {
            padding: 6px 8px 4px;
            gap: 6px;
        }

        .vessel-card__hero .vessel-card__photo {
            width: 68px;
            min-height: 50px;
            max-height: 58px;
            flex-shrink: 0;
            border-radius: 4px;
            border: none;
            aspect-ratio: auto;
        }

        .vessel-card--media .vessel-card__hero .vessel-card__photo {
            width: 96px;
            min-height: 72px;
            max-height: 84px;
        }

        .vessel-card--detailed .vessel-card__hero .vessel-card__photo {
            width: 76px;
            min-height: 56px;
            max-height: 66px;
        }

        .vessel-card__identity {
            flex: 1;
            min-width: 0;
        }

        .vessel-card__photo {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .vessel-card__photo-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .vessel-card__photo-image--hidden {
            display: none !important;
        }

        .vessel-card__photo-placeholder {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            color: var(--vc-muted);
            font-size: 0.58rem;
            text-align: center;
            padding: 4px;
        }

        .vessel-card__photo-icon {
            width: 18px;
            height: 18px;
            opacity: 0.5;
        }

        .vessel-card__photo--placeholder .vessel-card__photo-placeholder,
        .vessel-card__photo--fallback .vessel-card__photo-placeholder {
            display: flex;
        }

        .vessel-card__title-row {
            display: flex;
            align-items: flex-start;
            gap: 6px;
        }

        .vessel-card__flag {
            width: 22px;
            height: 15px;
            object-fit: contain;
            flex-shrink: 0;
            border-radius: 2px;
            border: none;
            background: transparent;
        }

        .vessel-card__flag--hidden {
            display: none !important;
        }

        .vessel-card__name {
            margin: 0;
            font-size: 0.88rem;
            font-weight: 700;
            line-height: 1.2;
            word-break: break-word;
            color: #f8fafc;
            flex: 1;
            min-width: 0;
        }

        .vessel-card--compact .vessel-card__name {
            font-size: 0.8rem;
        }

        .vessel-card__type {
            margin-top: 2px;
            font-size: 0.66rem;
            color: var(--vc-muted);
            line-height: 1.2;
        }

        .vessel-card__divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.07);
            margin: 0;
            flex-shrink: 0;
        }

        .vessel-card__row {
            display: block;
            padding: 3px 10px;
            min-width: 0;
        }

        .vessel-card--compact .vessel-card__row {
            padding: 2px 8px;
        }

        .vessel-card__row + .vessel-card__row {
            padding-top: 1px;
        }

        .vessel-card__label {
            display: block;
            font-size: 0.58rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--vc-label);
            line-height: 1.25;
            text-align: left;
            margin-bottom: 1px;
        }

        .vessel-card--compact .vessel-card__label {
            font-size: 0.54rem;
        }

        .vessel-card__value {
            display: block;
            font-size: 0.74rem;
            font-weight: 500;
            color: var(--vc-text);
            word-break: break-word;
            line-height: 1.3;
            text-align: left;
        }

        .vessel-card--compact .vessel-card__value {
            font-size: 0.68rem;
        }

        .vessel-card__value--empty {
            color: #5f6b7a;
            font-weight: 400;
        }

        .vessel-card__value--on {
            color: #5eead4;
            font-weight: 600;
        }

        .vessel-card__value--off {
            color: #9aa4af;
            font-weight: 500;
        }

        .vessel-card__row--logbook {
            justify-content: center;
            margin-top: 4px;
        }

        .vessel-card__logbook-btn {
            width: 100%;
            border: 1px solid var(--px-primary-700);
            border-radius: 6px;
            background: var(--px-primary-900);
            color: white;
            font-size: 12px;
            font-weight: 600;
            padding: 8px 12px;
            cursor: pointer;
        }

        .vessel-card__logbook-btn:hover {
            background: var(--px-primary-surface-hover);
        }

        .vessel-popup {
            position: absolute;
            z-index: 1100;
            transform: translate(-50%, calc(-100% - 16px));
            pointer-events: auto;
            max-width: min(300px, calc(100vw - 48px));
        }

        .vessel-popup[hidden] {
            display: none;
        }

        #map .cesium-widget,
        #map .cesium-widget canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>

<div id="map"></div>
<div id="empty-state" class="map-empty-state" hidden></div>
<div id="vessel-popup" class="vessel-popup" hidden></div>

<script>
bootstrapMapEngine().catch(function(error)
{
    console.error(error);

    const overlay = document.getElementById("empty-state");

    if (!overlay)
        return;

    overlay.textContent = String(error && error.message ? error.message : error);
    overlay.hidden = false;
});
</script>

</body>
</html>
