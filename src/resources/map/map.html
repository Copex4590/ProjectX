<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Project X Map</title>

    <link rel="stylesheet" href="leaflet/leaflet.css">
    <script src="leaflet/leaflet.js"></script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        .ship-icon {
            background: transparent !important;
            border: none !important;
        }

        .ship-body {
            color: #1976d2;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-origin: center center;
        }

        .ship-body--moving {
            font-size: 20px;
            font-weight: bold;
            line-height: 1;
            transition: transform 0.25s ease-out;
        }

        .ship-body--stationary {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: currentColor;
            flex-shrink: 0;
        }

        .leaflet-popup-content-wrapper {
            background: transparent !important;
            box-shadow: none !important;
            border-radius: 18px !important;
            padding: 0 !important;
        }

        .leaflet-popup-content {
            margin: 0 !important;
            width: auto !important;
            min-width: 0 !important;
            line-height: 1.4;
        }

        .leaflet-popup-tip-container {
            margin-top: -1px;
        }

        .leaflet-popup-tip {
            background: rgba(18, 22, 30, 0.82) !important;
            box-shadow: none !important;
        }

        .observation-marker {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid #ffffff;
        }

        .observation-marker--active {
            background: #43a047;
            box-shadow: 0 0 8px rgba(67, 160, 71, 0.75);
        }

        .observation-marker--inactive {
            background: #e53935;
            box-shadow: 0 0 8px rgba(229, 57, 53, 0.75);
        }

        .map-context-menu {
            display: none;
        }

        .pick-marker {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #1976d2;
            border: 2px solid #ffffff;
            box-shadow: 0 0 8px rgba(25, 118, 210, 0.75);
        }

        .map-empty-state {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            max-width: min(90%, 320px);
            padding: 12px 16px;
            border-radius: 10px;
            background: rgba(29, 33, 39, 0.92);
            border: 1px solid #3d4a5c;
            color: #d5dbe3;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            font-size: 13px;
            text-align: center;
            pointer-events: none;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        }

        .map-empty-state[hidden] {
            display: none;
        }

        .vessel-card {
            --vc-bg: rgba(18, 22, 30, 0.92);
            --vc-border: rgba(255, 255, 255, 0.08);
            --vc-text: #eef2f7;
            --vc-muted: #8b95a5;
            --vc-label: #7a8494;
            --vc-radius: 10px;

            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            color: var(--vc-text);
            background: var(--vc-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--vc-border);
            border-radius: var(--vc-radius);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.32);
            overflow: hidden;
            width: min(300px, calc(100vw - 48px));
        }

        .vessel-card--compact {
            width: min(248px, calc(100vw - 48px));
        }

        .vessel-card--standard {
            width: min(280px, calc(100vw - 48px));
        }

        .vessel-card--detailed,
        .vessel-card--media {
            width: min(300px, calc(100vw - 48px));
        }

        .vessel-card__scroll {
            display: flex;
            flex-direction: column;
        }

        .vessel-card__scroll--scrollable {
            max-height: min(56vh, 400px);
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.18) transparent;
        }

        .vessel-card--compact .vessel-card__scroll--scrollable {
            max-height: min(36vh, 240px);
        }

        .vessel-card--standard .vessel-card__scroll--scrollable {
            max-height: min(48vh, 340px);
        }

        .vessel-card--media .vessel-card__scroll--scrollable {
            max-height: min(60vh, 440px);
        }

        .vessel-card__hero {
            display: flex;
            gap: 8px;
            padding: 8px 10px 6px;
            align-items: flex-start;
        }

        .vessel-card--compact .vessel-card__hero {
            padding: 6px 8px 4px;
            gap: 6px;
        }

        .vessel-card__hero .vessel-card__photo {
            width: 68px;
            min-height: 50px;
            max-height: 58px;
            flex-shrink: 0;
            border-radius: 4px;
            border: none;
            aspect-ratio: auto;
        }

        .vessel-card--media .vessel-card__hero .vessel-card__photo {
            width: 96px;
            min-height: 72px;
            max-height: 84px;
        }

        .vessel-card--detailed .vessel-card__hero .vessel-card__photo {
            width: 76px;
            min-height: 56px;
            max-height: 66px;
        }

        .vessel-card__identity {
            flex: 1;
            min-width: 0;
        }

        .vessel-card__photo {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .vessel-card__photo-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .vessel-card__photo-image--hidden {
            display: none !important;
        }

        .vessel-card__photo-placeholder {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            color: var(--vc-muted);
            font-size: 0.58rem;
            text-align: center;
            padding: 4px;
        }

        .vessel-card__photo-icon {
            width: 18px;
            height: 18px;
            opacity: 0.5;
        }

        .vessel-card__photo--placeholder .vessel-card__photo-placeholder,
        .vessel-card__photo--fallback .vessel-card__photo-placeholder {
            display: flex;
        }

        .vessel-card__title-row {
            display: flex;
            align-items: flex-start;
            gap: 6px;
        }

        .vessel-card__flag {
            width: 22px;
            height: 15px;
            object-fit: contain;
            flex-shrink: 0;
            border-radius: 2px;
            border: none;
            background: transparent;
        }

        .vessel-card__flag--hidden {
            display: none !important;
        }

        .vessel-card__name {
            margin: 0;
            font-size: 0.88rem;
            font-weight: 700;
            line-height: 1.2;
            word-break: break-word;
            color: #f8fafc;
            flex: 1;
            min-width: 0;
        }

        .vessel-card--compact .vessel-card__name {
            font-size: 0.8rem;
        }

        .vessel-card__type {
            margin-top: 2px;
            font-size: 0.66rem;
            color: var(--vc-muted);
            line-height: 1.2;
        }

        .vessel-card__divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.07);
            margin: 0;
            flex-shrink: 0;
        }

        .vessel-card__row {
            display: block;
            padding: 3px 10px;
            min-width: 0;
        }

        .vessel-card--compact .vessel-card__row {
            padding: 2px 8px;
        }

        .vessel-card__row + .vessel-card__row {
            padding-top: 1px;
        }

        .vessel-card__label {
            display: block;
            font-size: 0.58rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--vc-label);
            line-height: 1.25;
            text-align: left;
            margin-bottom: 1px;
        }

        .vessel-card--compact .vessel-card__label {
            font-size: 0.54rem;
        }

        .vessel-card__value {
            display: block;
            font-size: 0.74rem;
            font-weight: 500;
            color: var(--vc-text);
            word-break: break-word;
            line-height: 1.3;
            text-align: left;
        }

        .vessel-card--compact .vessel-card__value {
            font-size: 0.68rem;
        }

        .vessel-card__value--empty {
            color: #5f6b7a;
            font-weight: 400;
        }

        .vessel-card__value--on {
            color: #5eead4;
            font-weight: 600;
        }

        .vessel-card__value--off {
            color: #9aa4af;
            font-weight: 500;
        }

        .vessel-card__row--logbook {
            justify-content: center;
            margin-top: 4px;
        }

        .vessel-card__logbook-btn {
            width: 100%;
            border: 1px solid #2d5a8e;
            border-radius: 6px;
            background: #243651;
            color: white;
            font-size: 12px;
            font-weight: 600;
            padding: 8px 12px;
            cursor: pointer;
        }

        .vessel-card__logbook-btn:hover {
            background: #2d4a6f;
        }
    </style>
</head>

<body>

<div id="map"></div>
<div id="empty-state" class="map-empty-state" hidden></div>

<script>

const WORLD_BOUNDS = L.latLngBounds(
    L.latLng(-60, -180),
    L.latLng(75, 180)
);
const WORLD_VIEW_CENTER = [20, 0];
const WORLD_VIEW_ZOOM = 2;

const map = L.map("map", {
    worldCopyJump: true,
    minZoom: 2,
    maxBounds: WORLD_BOUNDS,
    maxBoundsViscosity: 1.0
});

L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {
        maxZoom: 19,
        attribution: "© OpenStreetMap"
    }
).addTo(map);

const ships = {};
const trails = {};
let openPopupMmsi = null;
let bridge = null;
let pendingPickLocation = null;

function reportPickLocation(latitude, longitude)
{
    if (bridge && bridge.reportLocation)
    {
        bridge.reportLocation(latitude, longitude);
        pendingPickLocation = null;
        return;
    }

    pendingPickLocation = {
        lat: latitude,
        lon: longitude
    };
}

function initBridge()
{
    if (typeof qt === "undefined")
        return;

    new QWebChannel(qt.webChannelTransport, function(channel)
    {
        bridge = channel.objects.bridge;

        if (pendingPickLocation && bridge && bridge.reportLocation)
        {
            bridge.reportLocation(
                pendingPickLocation.lat,
                pendingPickLocation.lon
            );
            pendingPickLocation = null;
        }
    });
}

function attachLogbookHandlers(popupElement)
{
    if (!popupElement || !bridge || !bridge.openLogbook)
        return;

    popupElement.querySelectorAll(".vessel-card__logbook-btn").forEach(function(btn)
    {
        btn.onclick = function()
        {
            const mmsi = Number(btn.getAttribute("data-mmsi"));

            if (Number.isFinite(mmsi))
                bridge.openLogbook(mmsi);
        };
    });
}

initBridge();
const observationMarkers = {};
let pickEnabled = false;
let pickMarker = null;

function observationIcon(active)
{
    const stateClass = active
        ? "observation-marker--active"
        : "observation-marker--inactive";

    return L.divIcon({
        className: "",
        html: "<div class='observation-marker " + stateClass + "'></div>",
        iconSize: [18, 18],
        iconAnchor: [9, 9]
    });
}

function hideContextMenu()
{
}

function showContextMenu(clientX, clientY, items)
{
}

document.addEventListener("click", hideContextMenu);

function fitWorldMap()
{
    const size = map.getSize();

    if (size.x < 100 || size.y < 100)
    {
        map.setView(WORLD_VIEW_CENTER, WORLD_VIEW_ZOOM, { animate: false });
        return;
    }

    map.fitBounds(WORLD_BOUNDS, {
        padding: [20, 20],
        maxZoom: 4,
        animate: false
    });
}

function resetMapToWorldView()
{
    map.setView(WORLD_VIEW_CENTER, WORLD_VIEW_ZOOM, { animate: false });
    map.invalidateSize();
    fitWorldMap();

    requestAnimationFrame(function()
    {
        map.invalidateSize();
        fitWorldMap();
    });

    window.setTimeout(function()
    {
        map.invalidateSize();
        fitWorldMap();
    }, 50);

    window.setTimeout(function()
    {
        map.invalidateSize();
        fitWorldMap();
    }, 200);
}

function showEmptyOverlay(message)
{
    const overlay = document.getElementById("empty-state");

    if (!overlay)
        return;

    if (message)
    {
        overlay.textContent = message;
        overlay.hidden = false;
    }
    else
    {
        overlay.textContent = "";
        overlay.hidden = true;
    }
}

function clearObservationPoints(message)
{
    for (const pointId in observationMarkers)
    {
        map.removeLayer(observationMarkers[pointId]);
        delete observationMarkers[pointId];
    }

    resetMapToWorldView();
    showEmptyOverlay(message || "");
}

function updateObservationPoints(points)
{
    const activeIds = new Set();
    const preservePickOverlay = pickEnabled;

    if (!preservePickOverlay)
        showEmptyOverlay("");

    for (const point of points)
    {
        const pointId = String(point.id);
        activeIds.add(pointId);

        const position = [point.lat, point.lon];

        if (!observationMarkers[pointId])
        {
            observationMarkers[pointId] = L.marker(position, {
                icon: observationIcon(!!point.active)
            }).addTo(map);
        }
        else
        {
            observationMarkers[pointId].setLatLng(position);
            observationMarkers[pointId].setIcon(
                observationIcon(!!point.active)
            );
        }
    }

    for (const pointId in observationMarkers)
    {
        if (!activeIds.has(pointId))
        {
            map.removeLayer(observationMarkers[pointId]);
            delete observationMarkers[pointId];
        }
    }

    if (preservePickOverlay)
        return;

    if (points.length === 0)
    {
        fitWorldMap();
        return;
    }

    if (points.length === 1)
    {
        map.setView(
            [points[0].lat, points[0].lon],
            Math.max(map.getZoom(), 11),
            { animate: false }
        );
    }
}

function enablePickMode(enabled)
{
    pickEnabled = !!enabled;

    if (!pickEnabled)
        clearPickMarker();
}

function beginLocationPick(message)
{
    pickEnabled = true;
    clearPickMarker();
    showEmptyOverlay(message || "");
    resetMapToWorldView();
}

function refreshLocationPickView(message)
{
    pickEnabled = true;
    showEmptyOverlay(message || "");
    resetMapToWorldView();
}

function endLocationPick()
{
    pickEnabled = false;
    pendingPickLocation = null;
    clearPickMarker();
    showEmptyOverlay("");
}

function setPickOverlay(message)
{
    showEmptyOverlay(message || "");
}

function clearPickMarker()
{
    if (pickMarker)
    {
        map.removeLayer(pickMarker);
        pickMarker = null;
    }
}

function setPickMarker(lat, lon)
{
    clearPickMarker();

    const icon = L.divIcon({
        className: "",
        html: "<div class='pick-marker'></div>",
        iconSize: [16, 16],
        iconAnchor: [8, 8]
    });

    pickMarker = L.marker([lat, lon], { icon: icon }).addTo(map);
}

function clearObservationPoint(message)
{
    clearObservationPoints(message);
}

function setObservationPoint(lat, lon)
{
    updateObservationPoints([
        {
            id: "__legacy__",
            name: "",
            lat: lat,
            lon: lon,
            active: true
        }
    ]);
}

map.on("click", function(event)
{
    if (!pickEnabled)
        return;

    const latitude = event.latlng.lat;
    const longitude = event.latlng.lng;

    setPickMarker(latitude, longitude);
    reportPickLocation(latitude, longitude);
});

map.on("resize", function()
{
    if (pickEnabled)
        fitWorldMap();
});

fitWorldMap();

map.on("popupopen", function(event)
{
    for (const [mmsi, marker] of Object.entries(ships))
    {
        if (marker.getPopup() === event.popup)
        {
            openPopupMmsi = Number(mmsi);
            attachLogbookHandlers(event.popup.getElement());
            return;
        }
    }
});

map.on("popupclose", function()
{
    openPopupMmsi = null;
});

function restorePopupScroll(marker, scrollTop)
{
    if (!scrollTop)
        return;

    requestAnimationFrame(function()
    {
        const popupElement = marker.getPopup().getElement();

        if (!popupElement)
            return;

        const scrollElement = popupElement.querySelector(
            ".vessel-card__scroll--scrollable"
        );

        if (scrollElement)
            scrollElement.scrollTop = scrollTop;
    });
}

function popupContent(ship)
{
    if (ship.popup_html)
        return ship.popup_html;

    return "";
}

const MOVING_THRESHOLD_KN = 0.5;

function shipSpeedKn(ship)
{
    const speed = Number(ship.speed);
    return Number.isFinite(speed) ? speed : 0;
}

function shipCourseDeg(ship)
{
    const course = Number(ship.course);

    if (Number.isFinite(course))
        return ((course % 360) + 360) % 360;

    const heading = Number(ship.heading);

    if (Number.isFinite(heading))
        return ((heading % 360) + 360) % 360;

    return 0;
}

function isShipMoving(ship)
{
    return shipSpeedKn(ship) >= MOVING_THRESHOLD_KN;
}

function updateMarkerAppearance(marker, ship)
{
    const element = marker.getElement();

    if (!element)
    {
        requestAnimationFrame(function()
        {
            updateMarkerAppearance(marker, ship);
        });
        return;
    }

    let body = element.querySelector(".ship-body");

    if (!body)
    {
        body = document.createElement("div");
        body.className = "ship-body";
        element.appendChild(body);
    }

    if (isShipMoving(ship))
    {
        body.classList.add("ship-body--moving");
        body.classList.remove("ship-body--stationary");
        body.textContent = "▲";
        body.style.transform = "rotate(" + shipCourseDeg(ship) + "deg)";
        return;
    }

    body.classList.remove("ship-body--moving");
    body.classList.add("ship-body--stationary");
    body.textContent = "";
    body.style.transform = "";
}

function updateShips(list)
{
    const active = new Set();

    for (const ship of list)
    {
        const mmsi = ship.mmsi;
        active.add(mmsi);

        const pos = [ship.lat, ship.lon];

        if (!ships[mmsi])
        {
            const icon = L.divIcon({
                className: "ship-icon",
                html: "<div class='ship-body'></div>",
                iconSize: [24, 24],
                iconAnchor: [12, 12]
            });

            ships[mmsi] = L.marker(pos, {
                icon: icon
            }).addTo(map);

            ships[mmsi].bindPopup("");
        }
        else
        {
            ships[mmsi].setLatLng(pos);
        }

        updateMarkerAppearance(ships[mmsi], ship);

        const marker = ships[mmsi];
        const popupOpen = openPopupMmsi === mmsi && marker.isPopupOpen();
        let scrollTop = 0;

        if (popupOpen)
        {
            const popupElement = marker.getPopup().getElement();

            if (popupElement)
            {
                const scrollElement = popupElement.querySelector(
                    ".vessel-card__scroll--scrollable"
                );

                if (scrollElement)
                    scrollTop = scrollElement.scrollTop;
            }
        }

        marker.setPopupContent(popupContent(ship));
        restorePopupScroll(marker, scrollTop);

        if (popupOpen)
            attachLogbookHandlers(marker.getPopup().getElement());

        if (!trails[mmsi])
        {
            trails[mmsi] = L.polyline([], {
                color: "red",
                weight: 1
            }).addTo(map);
        }

        const line = trails[mmsi].getLatLngs();

        line.push(pos);

        if (line.length > 50)
            line.shift();

        trails[mmsi].setLatLngs(line);
    }

    for (const mmsi in ships)
    {
        if (!active.has(Number(mmsi)))
        {
            map.removeLayer(ships[mmsi]);
            delete ships[mmsi];

            if (trails[mmsi])
            {
                map.removeLayer(trails[mmsi]);
                delete trails[mmsi];
            }
        }
    }
}

function focusShip(mmsi)
{
    if (!ships[mmsi])
        return;

    map.setView(
        ships[mmsi].getLatLng(),
        15,
        {
            animate: true
        }
    );

    ships[mmsi].openPopup();
}

</script>

</body>
</html>
