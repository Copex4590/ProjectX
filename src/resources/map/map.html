<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Project X Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        .ship-icon {
            font-size: 22px;
            text-align: center;
            line-height: 24px;
            transform-origin: center center;
        }

        .ship-body {
            color: #1976d2;
            font-size: 20px;
            font-weight: bold;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .leaflet-popup-content-wrapper {
            background: transparent !important;
            box-shadow: none !important;
            border-radius: 18px !important;
            padding: 0 !important;
        }

        .leaflet-popup-content {
            margin: 0 !important;
            width: auto !important;
            min-width: 0 !important;
            line-height: 1.4;
        }

        .leaflet-popup-tip-container {
            margin-top: -1px;
        }

        .leaflet-popup-tip {
            background: rgba(18, 22, 30, 0.82) !important;
            box-shadow: none !important;
        }

        .vessel-card {
            --vc-bg: rgba(18, 22, 30, 0.88);
            --vc-border: rgba(255, 255, 255, 0.1);
            --vc-text: #eef2f7;
            --vc-muted: #8b95a5;
            --vc-label: #6b7688;
            --vc-accent: #5b9cf5;
            --vc-radius: 12px;

            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            color: var(--vc-text);
            background: var(--vc-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--vc-border);
            border-radius: var(--vc-radius);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.38);
            overflow: hidden;
            width: min(320px, calc(100vw - 48px));
        }

        .vessel-card--compact {
            width: min(260px, calc(100vw - 48px));
            max-height: min(38vh, 280px);
        }

        .vessel-card--standard {
            width: min(300px, calc(100vw - 48px));
        }

        .vessel-card--detailed {
            width: min(320px, calc(100vw - 48px));
        }

        .vessel-card--media {
            width: min(340px, calc(100vw - 48px));
        }

        .vessel-card__scroll {
            display: flex;
            flex-direction: column;
            padding: 0;
        }

        .vessel-card__scroll--scrollable {
            max-height: min(58vh, 420px);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .vessel-card__hero {
            display: flex;
            gap: 8px;
            padding: 8px 10px 6px;
            align-items: flex-start;
        }

        .vessel-card--compact .vessel-card__hero {
            padding: 6px 8px 4px;
            gap: 6px;
        }

        .vessel-card__hero .vessel-card__photo {
            width: 72px;
            min-height: 54px;
            max-height: 64px;
            flex-shrink: 0;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            aspect-ratio: auto;
        }

        .vessel-card--media .vessel-card__hero .vessel-card__photo {
            width: 110px;
            min-height: 78px;
            max-height: 96px;
        }

        .vessel-card--detailed .vessel-card__hero .vessel-card__photo {
            width: 84px;
            min-height: 62px;
            max-height: 72px;
        }

        .vessel-card__identity {
            flex: 1;
            min-width: 0;
        }

        .vessel-card__photo {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .vessel-card__photo-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .vessel-card__photo-image--hidden {
            display: none !important;
        }

        .vessel-card__photo-placeholder {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: var(--vc-muted);
            font-size: 0.62rem;
            text-align: center;
            padding: 6px;
        }

        .vessel-card__photo-icon {
            width: 22px;
            height: 22px;
            opacity: 0.55;
        }

        .vessel-card__photo--placeholder .vessel-card__photo-placeholder,
        .vessel-card__photo--fallback .vessel-card__photo-placeholder {
            display: flex;
        }

        .vessel-card__title-row {
            display: flex;
            align-items: flex-start;
            gap: 6px;
        }

        .vessel-card__flag {
            width: 24px;
            height: 16px;
            object-fit: contain;
            flex-shrink: 0;
            border-radius: 2px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
        }

        .vessel-card__flag--hidden {
            display: none !important;
        }

        .vessel-card__name {
            margin: 0;
            font-size: 0.92rem;
            font-weight: 700;
            line-height: 1.2;
            word-break: break-word;
            color: #f8fafc;
            flex: 1;
            min-width: 0;
        }

        .vessel-card--compact .vessel-card__name {
            font-size: 0.82rem;
        }

        .vessel-card__type {
            margin-top: 3px;
            font-size: 0.68rem;
            color: var(--vc-muted);
            line-height: 1.2;
        }

        .vessel-card__divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.06);
            margin: 0;
        }

        .vessel-card__row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            padding: 5px 10px;
            min-width: 0;
        }

        .vessel-card--compact .vessel-card__row {
            padding: 4px 8px;
        }

        .vessel-card__label {
            flex: 0 0 38%;
            font-size: 0.62rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--vc-label);
            line-height: 1.3;
        }

        .vessel-card--compact .vessel-card__label {
            font-size: 0.58rem;
        }

        .vessel-card__value {
            flex: 1;
            text-align: right;
            font-size: 0.76rem;
            font-weight: 500;
            color: var(--vc-text);
            word-break: break-word;
            line-height: 1.3;
        }

        .vessel-card--compact .vessel-card__value {
            font-size: 0.7rem;
        }

        .vessel-card__value--empty {
            color: #5f6b7a;
            font-weight: 400;
        }

        .vessel-card__value--on {
            color: #5eead4;
            font-weight: 600;
        }

        .vessel-card__value--off {
            color: #9aa4af;
            font-weight: 500;
        }
    </style>
</head>

<body>

<div id="map"></div>

<script>

const map = L.map("map").setView([47.4979, 19.0402], 11);

L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {
        maxZoom: 19,
        attribution: "© OpenStreetMap"
    }
).addTo(map);

const ships = {};
const trails = {};
let openPopupMmsi = null;

map.on("popupopen", function(event)
{
    for (const [mmsi, marker] of Object.entries(ships))
    {
        if (marker.getPopup() === event.popup)
        {
            openPopupMmsi = Number(mmsi);
            return;
        }
    }
});

map.on("popupclose", function()
{
    openPopupMmsi = null;
});

function restorePopupScroll(marker, scrollTop)
{
    if (!scrollTop)
        return;

    requestAnimationFrame(function()
    {
        const popupElement = marker.getPopup().getElement();

        if (!popupElement)
            return;

        const scrollElement = popupElement.querySelector(
            ".vessel-card__scroll--scrollable"
        );

        if (scrollElement)
            scrollElement.scrollTop = scrollTop;
    });
}

function popupContent(ship)
{
    if (ship.popup_html)
        return ship.popup_html;

    return "";
}

function updateShips(list)
{
    const active = new Set();

    for (const ship of list)
    {
        const mmsi = ship.mmsi;
        active.add(mmsi);

        const pos = [ship.lat, ship.lon];

        if (!ships[mmsi])
        {
            const icon = L.divIcon({
                className: "ship-icon",
                html: "<div class='ship-body'>▲</div>",
                iconSize: [24, 24],
                iconAnchor: [12, 12]
            });

            ships[mmsi] = L.marker(pos, {
                icon: icon
            }).addTo(map);

            ships[mmsi].bindPopup("");
        }
        else
        {
            ships[mmsi].setLatLng(pos);
        }

        const marker = ships[mmsi];
        const popupOpen = openPopupMmsi === mmsi && marker.isPopupOpen();
        let scrollTop = 0;

        if (popupOpen)
        {
            const popupElement = marker.getPopup().getElement();

            if (popupElement)
            {
                const scrollElement = popupElement.querySelector(
                    ".vessel-card__scroll--scrollable"
                );

                if (scrollElement)
                    scrollTop = scrollElement.scrollTop;
            }
        }

        marker.setPopupContent(popupContent(ship));
        restorePopupScroll(marker, scrollTop);

        if (!trails[mmsi])
        {
            trails[mmsi] = L.polyline([], {
                color: "red",
                weight: 1
            }).addTo(map);
        }

        const line = trails[mmsi].getLatLngs();

        line.push(pos);

        if (line.length > 50)
            line.shift();

        trails[mmsi].setLatLngs(line);
    }

    for (const mmsi in ships)
    {
        if (!active.has(Number(mmsi)))
        {
            map.removeLayer(ships[mmsi]);
            delete ships[mmsi];

            if (trails[mmsi])
            {
                map.removeLayer(trails[mmsi]);
                delete trails[mmsi];
            }
        }
    }
}

function focusShip(mmsi)
{
    if (!ships[mmsi])
        return;

    map.setView(
        ships[mmsi].getLatLng(),
        15,
        {
            animate: true
        }
    );

    ships[mmsi].openPopup();
}

</script>

</body>
</html>
