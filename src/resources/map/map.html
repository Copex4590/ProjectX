<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Project X Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
    </style>
</head>

<body>

<div id="map"></div>

<script>

const map = L.map("map").setView([47.4979, 19.0402], 11);

L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {
        maxZoom: 19,
        attribution: "© OpenStreetMap"
    }
).addTo(map);

const ships = {};
const trails = {};

function updateShips(list)
{
    const active = new Set();

    for (const ship of list)
    {
        const mmsi = ship.mmsi;
        active.add(mmsi);

        const pos = [ship.lat, ship.lon];

        if (!ships[mmsi])
        {
            ships[mmsi] = L.marker(pos).addTo(map);
        }
        else
        {
            ships[mmsi].setLatLng(pos);
        }

        if (!trails[mmsi])
        {
            trails[mmsi] = L.polyline([], {
                color: "red",
                weight: 1
            }).addTo(map);
        }

        const line = trails[mmsi].getLatLngs();

        line.push(pos);

        if (line.length > 50)
            line.shift();

        trails[mmsi].setLatLngs(line);
    }

    for (const mmsi in ships)
    {
        if (!active.has(Number(mmsi)))
        {
            map.removeLayer(ships[mmsi]);
            delete ships[mmsi];

            if (trails[mmsi])
            {
                map.removeLayer(trails[mmsi]);
                delete trails[mmsi];
            }
        }
    }
}

function focusShip(mmsi)
{
    if (!ships[mmsi])
        return;

    map.setView(
        ships[mmsi].getLatLng(),
        15,
        {
            animate: true
        }
    );
}

</script>

</body>
</html>
