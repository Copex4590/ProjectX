<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>RTL Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>

<div id="map"></div>

<script>
    // 🚢 MAP INIT
    const map = L.map('map').setView([47.4979, 19.0402], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // =========================
    // 🚢 SHIPS + TRAILS
    // =========================

    const ships = {};
    const trails = {};

    function updateShip(mmsi, lat, lon, heading) {

        const pos = [lat, lon];

        // 🚢 marker
        if (!ships[mmsi]) {
            ships[mmsi] = L.marker(pos).addTo(map);
        } else {
            ships[mmsi].setLatLng(pos);
        }

        // 🚢 trail init
        if (!trails[mmsi]) {
            trails[mmsi] = L.polyline([], {
                color: 'red',
                weight: 1
            }).addTo(map);
        }

        // 🚢 add point to trail
        const line = trails[mmsi].getLatLngs();
        line.push(pos);

        // limit (ne nőjön végtelenre)
        if (line.length > 50) {
            line.shift();
        }

        trails[mmsi].setLatLngs(line);
    }

    function removeShip(mmsi) {

        if (ships[mmsi]) {
            map.removeLayer(ships[mmsi]);
            delete ships[mmsi];
        }

        if (trails[mmsi]) {
            map.removeLayer(trails[mmsi]);
            delete trails[mmsi];
        }
    }

    function updateTrail() {
        // nem használjuk külön
    }

</script>

</body>
</html>
