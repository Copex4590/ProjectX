<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Project X Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        .ship-icon {
            font-size: 22px;
            text-align: center;
            line-height: 24px;
            transform-origin: center center;
        }

        .ship-body {
            color: #1976d2;
            font-size: 20px;
            font-weight: bold;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .leaflet-popup-content-wrapper {
            background: transparent !important;
            box-shadow: none !important;
            border-radius: 18px !important;
            padding: 0 !important;
        }

        .leaflet-popup-content {
            margin: 0 !important;
            width: auto !important;
            min-width: 0 !important;
            line-height: 1.4;
        }

        .leaflet-popup-tip-container {
            margin-top: -1px;
        }

        .leaflet-popup-tip {
            background: rgba(18, 22, 30, 0.82) !important;
            box-shadow: none !important;
        }

        .vessel-card {
            --vc-bg: rgba(18, 22, 30, 0.82);
            --vc-border: rgba(255, 255, 255, 0.1);
            --vc-text: #eef2f7;
            --vc-muted: #8b95a5;
            --vc-label: #5c6675;
            --vc-accent: #5b9cf5;
            --vc-radius: 14px;

            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            color: var(--vc-text);
            background: var(--vc-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--vc-border);
            border-radius: var(--vc-radius);
            box-shadow:
                0 10px 32px rgba(0, 0, 0, 0.42),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            overflow: hidden;
            width: min(360px, calc(100vw - 48px));
        }

        .vessel-card--compact {
            width: min(300px, calc(100vw - 48px));
        }

        .vessel-card--compact .vessel-card__header {
            padding: 8px 10px 6px;
        }

        .vessel-card--compact .vessel-card__photo {
            min-height: 56px;
            max-height: 72px;
        }

        .vessel-card--compact .vessel-card__name {
            font-size: 0.98rem;
        }

        .vessel-card--compact .vessel-card__body {
            padding: 8px 10px 10px;
        }

        .vessel-card--compact .vessel-card__grid {
            gap: 6px 10px;
        }

        .vessel-card--compact .vessel-card__label {
            font-size: 0.62rem;
        }

        .vessel-card--compact .vessel-card__value {
            font-size: 0.78rem;
        }

        .vessel-card--standard .vessel-card__header {
            padding: 11px 13px 9px;
        }

        .vessel-card--standard .vessel-card__body {
            padding: 10px 12px 12px;
        }

        .vessel-card--standard .vessel-card__block {
            margin-bottom: 8px;
        }

        .vessel-card--media {
            width: min(400px, calc(100vw - 48px));
        }

        .vessel-card--media .vessel-card__photo {
            min-height: 220px;
            max-height: 280px;
        }

        .vessel-card--media .vessel-card__camera-panel {
            margin: 0 12px 12px;
            padding: 14px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .vessel-card--media .vessel-card__camera-title {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--vc-muted);
            margin-bottom: 8px;
        }

        .vessel-card--media .vessel-card__camera-value {
            font-size: 1.05rem;
            font-weight: 600;
        }

        .vessel-card__header {
            padding: 13px 15px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            background: linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.04) 0%,
                transparent 100%
            );
        }

        .vessel-card__header:not(:has(.vessel-card__badge)) {
            padding-bottom: 13px;
        }

        .vessel-card__photo {
            position: relative;
            width: 100%;
            min-height: 140px;
            max-height: 200px;
            aspect-ratio: 16 / 9;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .vessel-card__photo-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .vessel-card__photo-image--hidden {
            display: none !important;
        }

        .vessel-card__photo-placeholder {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: var(--vc-muted);
            font-size: 0.78rem;
            text-align: center;
            padding: 16px;
        }

        .vessel-card__photo-icon {
            width: 34px;
            height: 34px;
            opacity: 0.55;
        }

        .vessel-card__photo--placeholder .vessel-card__photo-placeholder,
        .vessel-card__photo--fallback .vessel-card__photo-placeholder {
            display: flex;
        }

        .vessel-card__title-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 7px;
        }

        .vessel-card__flag {
            width: 30px;
            height: 21px;
            object-fit: contain;
            flex-shrink: 0;
            border-radius: 3px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
        }

        .vessel-card__flag--hidden {
            display: none !important;
        }

        .vessel-card__name {
            margin: 0;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            line-height: 1.15;
            word-break: break-word;
            color: #f8fafc;
            flex: 1;
            min-width: 0;
        }

        .vessel-card__badges {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .vessel-card__badges:empty {
            display: none;
        }

        .vessel-card__badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 2px 9px 2px 7px;
            border-radius: 999px;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border: 1px solid transparent;
            line-height: 1.3;
        }

        .vessel-card__badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 6px currentColor;
        }

        .vessel-card__badge--type {
            color: #b8c5d9;
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.09);
        }

        .vessel-card__badge--type .vessel-card__badge-dot {
            background: #94a3b8;
            box-shadow: none;
        }

        .vessel-card__badge--source {
            color: #fff;
        }

        .vessel-card__badge--rtl {
            background: linear-gradient(
                135deg,
                rgba(245, 158, 11, 0.3),
                rgba(217, 119, 6, 0.16)
            );
            border-color: rgba(251, 191, 36, 0.42);
            color: #fde68a;
            box-shadow: 0 0 14px rgba(245, 158, 11, 0.12);
        }

        .vessel-card__badge--rtl .vessel-card__badge-dot {
            background: #fbbf24;
        }

        .vessel-card__badge--ais {
            background: linear-gradient(
                135deg,
                rgba(59, 130, 246, 0.3),
                rgba(37, 99, 235, 0.16)
            );
            border-color: rgba(96, 165, 250, 0.42);
            color: #bfdbfe;
            box-shadow: 0 0 14px rgba(59, 130, 246, 0.12);
        }

        .vessel-card__badge--ais .vessel-card__badge-dot {
            background: #60a5fa;
        }

        .vessel-card__badge--hybrid {
            background: linear-gradient(
                135deg,
                rgba(139, 92, 246, 0.3),
                rgba(109, 40, 217, 0.16)
            );
            border-color: rgba(167, 139, 250, 0.42);
            color: #ddd6fe;
            box-shadow: 0 0 14px rgba(139, 92, 246, 0.12);
        }

        .vessel-card__badge--hybrid .vessel-card__badge-dot {
            background: #a78bfa;
        }

        .vessel-card__body {
            padding: 8px 11px 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .vessel-card__block {
            background: rgba(255, 255, 255, 0.025);
            border: 1px solid rgba(255, 255, 255, 0.045);
            border-radius: 10px;
            padding: 7px 10px;
        }

        .vessel-card__block-title {
            display: flex;
            align-items: center;
            gap: 5px;
            margin: 0 0 5px;
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 0.11em;
            text-transform: uppercase;
            color: #7a8494;
        }

        .vessel-card__block-icon {
            width: 11px;
            height: 11px;
            flex-shrink: 0;
            stroke: var(--vc-accent);
            opacity: 0.85;
        }

        .vessel-card__grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 5px 10px;
            margin: 0;
        }

        .vessel-card__item {
            min-width: 0;
        }

        .vessel-card__item--full {
            grid-column: 1 / -1;
        }

        .vessel-card__label {
            display: block;
            font-size: 0.56rem;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--vc-label);
            margin-bottom: 1px;
        }

        .vessel-card__value {
            display: block;
            font-size: 0.76rem;
            font-weight: 500;
            color: var(--vc-text);
            word-break: break-word;
            line-height: 1.25;
        }

        .vessel-card__value--mono {
            font-variant-numeric: tabular-nums;
            font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
            font-size: 0.72rem;
            font-weight: 600;
            color: #dce4ef;
        }

        .vessel-card__value--empty {
            color: #5f6b7a;
            font-weight: 400;
        }

        .vessel-card__value--on {
            color: #5eead4;
            font-weight: 600;
        }

        .vessel-card__value--off {
            color: #5f6b7a;
            font-weight: 400;
        }

        @media (max-width: 320px) {
            .vessel-card__grid {
                grid-template-columns: 1fr;
            }

            .vessel-card__item--full {
                grid-column: auto;
            }
        }
    </style>
</head>

<body>

<div id="map"></div>

<script>

const map = L.map("map").setView([47.4979, 19.0402], 11);

L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {
        maxZoom: 19,
        attribution: "© OpenStreetMap"
    }
).addTo(map);

const ships = {};
const trails = {};
const shipData = {};

let vesselCardLayout = "standard";
let translations = {};

function tr(key)
{
    if (translations && translations[key])
        return translations[key];

    return key;
}

function setVesselCardLayout(layout)
{
    vesselCardLayout = layout || "standard";
    refreshAllPopups();
}

function setTranslations(dict)
{
    translations = dict || {};
    refreshAllPopups();
}

function refreshAllPopups()
{
    for (const mmsi in shipData)
    {
        if (!ships[mmsi])
            continue;

        ships[mmsi].setPopupContent(buildVesselCard(shipData[mmsi]));
    }
}

function esc(value)
{
    if (value === null || value === undefined)
        return "";

    return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
}

function isEmpty(value)
{
    return (
        value === null
        || value === undefined
        || value === ""
        || value === "None"
        || value === "null"
    );
}

function dash(value)
{
    if (isEmpty(value))
        return "—";

    return value;
}

function formatCoord(value)
{
    if (isEmpty(value) || Number.isNaN(Number(value)))
        return "—";

    return Number(value).toFixed(5) + "°";
}

function formatNumber(value, digits)
{
    if (isEmpty(value) || Number.isNaN(Number(value)))
        return "—";

    return Number(value).toFixed(digits);
}

function formatAngle(value)
{
    if (isEmpty(value) || Number.isNaN(Number(value)))
        return "—";

    return Number(value).toFixed(1) + "°";
}

function formatSpeed(value)
{
    if (isEmpty(value) || Number.isNaN(Number(value)))
        return "—";

    return Number(value).toFixed(1) + " kn";
}

function formatDistance(value)
{
    if (isEmpty(value) || Number.isNaN(Number(value)))
        return "—";

    return Number(value).toFixed(2) + " km";
}

function formatBool(value)
{
    if (value === true)
        return { text: tr("Yes"), className: "vessel-card__value--on" };

    if (value === false)
        return { text: tr("No"), className: "vessel-card__value--off" };

    return { text: "—", className: "vessel-card__value--empty" };
}

function formatLastSeen(value)
{
    if (isEmpty(value))
        return "—";

    const parsed = new Date(value);

    if (Number.isNaN(parsed.getTime()))
        return esc(dash(value));

    return esc(parsed.toLocaleString());
}

function normalizeSource(source)
{
    const text = dash(source);

    if (text === "—")
        return { label: "—", className: "vessel-card__badge--unknown" };

    const upper = String(source).trim().toUpperCase();

    if (upper.includes("HYBRID"))
        return { label: "Hybrid", className: "vessel-card__badge--hybrid" };

    if (upper === "RTL" || upper.includes("RTL"))
        return { label: "RTL", className: "vessel-card__badge--rtl" };

    if (upper === "AIS" || upper.includes("AIS"))
        return { label: "AIS", className: "vessel-card__badge--ais" };

    return { label: esc(text), className: "vessel-card__badge--unknown" };
}

function fieldItem(label, value, options = {})
{
    const empty = isEmpty(value) || value === "—";
    const classes = [
        "vessel-card__value",
        options.mono ? "vessel-card__value--mono" : "",
        options.stateClass || "",
        empty ? "vessel-card__value--empty" : "",
    ].filter(Boolean).join(" ");

    const itemClass = options.full ? "vessel-card__item vessel-card__item--full" : "vessel-card__item";

    return `
        <div class="${itemClass}">
            <span class="vessel-card__label">${esc(label)}</span>
            <span class="${classes}">${value}</span>
        </div>
    `;
}

function buildPhotoPlaceholder()
{
    return `
        <div class="vessel-card__photo-placeholder" aria-hidden="true">
            <svg class="vessel-card__photo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 18h16"></path>
                <path d="M6 18l2-8h8l2 8"></path>
                <path d="M8 10V6h8v4"></path>
                <path d="M12 6V4"></path>
            </svg>
            <span>${tr("No photo available")}</span>
        </div>
    `;
}

function buildPhotoSection(ship)
{
    if (ship.has_photo && ship.photo_url)
    {
        const altText = isEmpty(ship.name) ? tr("Vessel photo") : esc(ship.name);

        return `
            <div class="vessel-card__photo">
                <img
                    class="vessel-card__photo-image"
                    src="${esc(ship.photo_url)}"
                    alt="${altText}"
                    onerror="this.classList.add('vessel-card__photo-image--hidden'); this.parentElement.classList.add('vessel-card__photo--fallback');"
                >
                ${buildPhotoPlaceholder()}
            </div>
        `;
    }

    return `
        <div class="vessel-card__photo vessel-card__photo--placeholder">
            ${buildPhotoPlaceholder()}
        </div>
    `;
}

function buildFlagMarkup(ship)
{
    if (!ship.flag_url)
    {
        return "";
    }

    const altText = ship.flag_code
        ? `${esc(ship.flag_code)} flag`
        : "Default flag";
    const fallback = ship.flag_fallback_url
        ? ` data-fallback="${esc(ship.flag_fallback_url)}"`
        : "";

    return `
        <img
            class="vessel-card__flag"
            src="${esc(ship.flag_url)}"
            alt="${altText}"${fallback}
            onerror="if (this.dataset.fallback && this.src !== this.dataset.fallback) { this.src = this.dataset.fallback; delete this.dataset.fallback; } else { this.classList.add('vessel-card__flag--hidden'); }"
        >
    `;
}

function buildCompactCard(ship)
{
    const name = isEmpty(ship.name) ? tr("Unknown Vessel") : esc(ship.name);
    const camera = formatBool(ship.camera_visible);

    return `
        <div class="vessel-card vessel-card--compact">
            <header class="vessel-card__header">
                <div class="vessel-card__title-row">
                    ${buildFlagMarkup(ship)}
                    <h2 class="vessel-card__name">${name}</h2>
                </div>
            </header>
            ${buildPhotoSection(ship)}
            <div class="vessel-card__body">
                <div class="vessel-card__grid">
                    ${fieldItem(tr("MMSI"), esc(dash(ship.mmsi)), { mono: true })}
                    ${fieldItem(tr("Speed"), formatSpeed(ship.speed), { mono: true })}
                    ${fieldItem(tr("Course"), formatAngle(ship.course), { mono: true })}
                    ${fieldItem(tr("Camera Status"), esc(camera.text), { stateClass: camera.className })}
                </div>
            </div>
        </div>
    `;
}

function buildStandardCard(ship)
{
    return buildDetailedCard(ship, "vessel-card--standard");
}

function buildDetailedCard(ship, layoutClass)
{
    const name = isEmpty(ship.name) ? tr("Unknown Vessel") : esc(ship.name);
    const typeLabel = isEmpty(ship.ship_type) ? "—" : esc(dash(ship.ship_type));
    const source = normalizeSource(ship.source);

    const ais = formatBool(ship.ais_visible);
    const rtl = formatBool(ship.rtl_visible);
    const camera = formatBool(ship.camera_visible);

    const iconId = `<svg class="vessel-card__block-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 8h4"/><path d="M7 12h10"/><path d="M7 16h6"/></svg>`;
    const iconPos = `<svg class="vessel-card__block-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-4.5 7-11a7 7 0 1 0-14 0c0 6.5 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>`;
    const iconNav = `<svg class="vessel-card__block-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3v3"/><path d="M12 18v3"/><path d="M3 12h3"/><path d="M18 12h3"/><path d="m14.5 9.5-5 2 2 5 5-2-2-5z"/></svg>`;
    const iconVoy = `<svg class="vessel-card__block-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 18h16"/><path d="M6 18l2-8h8l2 8"/><path d="M8 10V6h8v4"/><path d="M12 6V4"/></svg>`;
    const iconVis = `<svg class="vessel-card__block-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>`;

    const cardClass = layoutClass
        ? `vessel-card ${layoutClass}`
        : "vessel-card";

    return `
        <div class="${cardClass}">
            <header class="vessel-card__header">
                <div class="vessel-card__title-row">
                    ${buildFlagMarkup(ship)}
                    <h2 class="vessel-card__name">${name}</h2>
                </div>
                <div class="vessel-card__badges">
                    ${isEmpty(ship.ship_type) ? "" : `<span class="vessel-card__badge vessel-card__badge--type"><span class="vessel-card__badge-dot"></span>${typeLabel}</span>`}
                    ${source.label === "—" ? "" : `<span class="vessel-card__badge vessel-card__badge--source ${source.className}"><span class="vessel-card__badge-dot"></span>${source.label}</span>`}
                </div>
            </header>
            ${buildPhotoSection(ship)}
            <div class="vessel-card__body">
                <section class="vessel-card__block">
                    <h3 class="vessel-card__block-title">${iconId}${tr("Identification")}</h3>
                    <div class="vessel-card__grid">
                        ${fieldItem(tr("MMSI"), esc(dash(ship.mmsi)), { mono: true })}
                        ${fieldItem(tr("Callsign"), esc(dash(ship.callsign)))}
                    </div>
                </section>
                <section class="vessel-card__block">
                    <h3 class="vessel-card__block-title">${iconPos}${tr("Position")}</h3>
                    <div class="vessel-card__grid">
                        ${fieldItem(tr("Latitude"), formatCoord(ship.lat), { mono: true })}
                        ${fieldItem(tr("Longitude"), formatCoord(ship.lon), { mono: true })}
                        ${fieldItem(tr("Distance"), formatDistance(ship.distance_km), { mono: true })}
                        ${fieldItem(tr("Direction"), esc(dash(ship.direction)))}
                    </div>
                </section>
                <section class="vessel-card__block">
                    <h3 class="vessel-card__block-title">${iconNav}${tr("Navigation")}</h3>
                    <div class="vessel-card__grid">
                        ${fieldItem(tr("Speed"), formatSpeed(ship.speed), { mono: true })}
                        ${fieldItem(tr("Course"), formatAngle(ship.course), { mono: true })}
                        ${fieldItem(tr("Heading"), formatAngle(ship.heading), { mono: true })}
                        ${fieldItem(tr("Text Heading"), esc(dash(ship.text_heading)))}
                    </div>
                </section>
                <section class="vessel-card__block">
                    <h3 class="vessel-card__block-title">${iconVoy}${tr("Voyage")}</h3>
                    <div class="vessel-card__grid">
                        ${fieldItem(tr("Destination"), esc(dash(ship.destination)), { full: true })}
                        ${fieldItem(tr("ETA"), esc(dash(ship.eta)))}
                        ${fieldItem(tr("Last Seen"), formatLastSeen(ship.last_seen))}
                    </div>
                </section>
                <section class="vessel-card__block">
                    <h3 class="vessel-card__block-title">${iconVis}${tr("Visibility")}</h3>
                    <div class="vessel-card__grid">
                        ${fieldItem(tr("AIS Visible"), esc(ais.text), { stateClass: ais.className })}
                        ${fieldItem(tr("RTL Visible"), esc(rtl.text), { stateClass: rtl.className })}
                        ${fieldItem(tr("Camera Visible"), esc(camera.text), { stateClass: camera.className })}
                    </div>
                </section>
            </div>
        </div>
    `;
}

function buildMediaCard(ship)
{
    const name = isEmpty(ship.name) ? tr("Unknown Vessel") : esc(ship.name);
    const camera = formatBool(ship.camera_visible);

    return `
        <div class="vessel-card vessel-card--media">
            ${buildPhotoSection(ship)}
            <header class="vessel-card__header">
                <div class="vessel-card__title-row">
                    ${buildFlagMarkup(ship)}
                    <h2 class="vessel-card__name">${name}</h2>
                </div>
            </header>
            <div class="vessel-card__camera-panel">
                <div class="vessel-card__camera-title">${tr("Camera Status")}</div>
                <div class="vessel-card__camera-value ${camera.className}">${esc(camera.text)}</div>
            </div>
            <div class="vessel-card__body">
                <div class="vessel-card__grid">
                    ${fieldItem(tr("MMSI"), esc(dash(ship.mmsi)), { mono: true })}
                    ${fieldItem(tr("Speed"), formatSpeed(ship.speed), { mono: true })}
                    ${fieldItem(tr("Course"), formatAngle(ship.course), { mono: true })}
                    ${fieldItem(tr("Callsign"), esc(dash(ship.callsign)))}
                </div>
            </div>
        </div>
    `;
}

function buildVesselCard(ship)
{
    const layout = vesselCardLayout || "standard";

    if (layout === "compact")
        return buildCompactCard(ship);

    if (layout === "media")
        return buildMediaCard(ship);

    if (layout === "detailed")
        return buildDetailedCard(ship, "");

    return buildStandardCard(ship);
}

function updateShips(list)
{
    const active = new Set();

    for (const ship of list)
    {
        const mmsi = ship.mmsi;
        active.add(mmsi);
        shipData[mmsi] = ship;

        const pos = [ship.lat, ship.lon];

        if (!ships[mmsi])
        {
            const icon = L.divIcon({
                className: "ship-icon",
                html: "<div class='ship-body'>▲</div>",
                iconSize: [24, 24],
                iconAnchor: [12, 12]
            });

            ships[mmsi] = L.marker(pos, {
                icon: icon
            }).addTo(map);

            ships[mmsi].bindPopup("");
        }
        else
        {
            ships[mmsi].setLatLng(pos);
        }

        ships[mmsi].setPopupContent(buildVesselCard(ship));

        if (!trails[mmsi])
        {
            trails[mmsi] = L.polyline([], {
                color: "red",
                weight: 1
            }).addTo(map);
        }

        const line = trails[mmsi].getLatLngs();

        line.push(pos);

        if (line.length > 50)
            line.shift();

        trails[mmsi].setLatLngs(line);
    }

    for (const mmsi in ships)
    {
        if (!active.has(Number(mmsi)))
        {
            map.removeLayer(ships[mmsi]);
            delete ships[mmsi];
            delete shipData[mmsi];

            if (trails[mmsi])
            {
                map.removeLayer(trails[mmsi]);
                delete trails[mmsi];
            }
        }
    }
}

function focusShip(mmsi)
{
    if (!ships[mmsi])
        return;

    map.setView(
        ships[mmsi].getLatLng(),
        15,
        {
            animate: true
        }
    );

    ships[mmsi].openPopup();
}

</script>
